<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="50%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A1080" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Gold accent line -->
  <rect x="80" y="80" width="3" height="470" fill="url(#gold)" opacity="0.6"/>
  <!-- PLD dot -->
  <circle cx="80" cy="80" r="8" fill="#C9A84C"/>
  <!-- Name -->
  <text x="120" y="230" font-family="Georgia, serif" font-size="88" font-weight="900" fill="white">Francisco</text>
  <text x="120" y="330" font-family="Georgia, serif" font-size="88" font-weight="900" fill="url(#gold)">Javier García</text>
  <!-- Year -->
  <text x="120" y="440" font-family="Georgia, serif" font-size="130" font-weight="900" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2">2028</text>
  <!-- Slogan -->
  <text x="120" y="510" font-family="Georgia, serif" font-size="26" font-style="italic" fill="rgba(255,255,255,0.65)">El turismo fue el inicio. El país entero es el destino.</text>
  <!-- PLD badge -->
  <rect x="120" y="540" width="180" height="36" rx="2" fill="rgba(107,31,168,0.5)" stroke="#C9A84C" stroke-width="1"/>
  <text x="210" y="563" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#C9A84C" letter-spacing="3">PLD · 2028</text>
</svg>
