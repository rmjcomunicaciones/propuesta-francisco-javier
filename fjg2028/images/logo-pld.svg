<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B1FA8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="60" cy="60" r="58" fill="url(#logoGrad)"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- Inner decorative ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Palm tree icon (Dominican symbol) -->
  <g transform="translate(60,60)">
    <!-- Trunk -->
    <rect x="-3" y="5" width="6" height="28" rx="3" fill="white" opacity="0.9"/>
    <!-- Trunk curve -->
    <path d="M-3,20 Q5,15 3,5" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>

    <!-- Leaves -->
    <path d="M0,5 Q-20,-15 -25,-5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,5 Q-15,-25 -5,-28" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,5 Q0,-28 8,-30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,5 Q18,-22 22,-10" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,5 Q22,-10 20,0" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Star -->
    <polygon points="0,-34 2,-29 7,-29 3,-26 5,-21 0,-24 -5,-21 -3,-26 -7,-29 -2,-29" fill="#FFD700"/>
  </g>

  <!-- PLD text -->
  <text x="60" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="url(#textGrad)" letter-spacing="3">PLD</text>
</svg>
