<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- DR Flag: blue and red quarters with white cross -->
  <rect width="450" height="300" fill="#002D62"/>
  <rect x="450" width="450" height="300" fill="#CF142B"/>
  <rect y="300" width="450" height="300" fill="#CF142B"/>
  <rect x="450" y="300" width="450" height="300" fill="#002D62"/>
  <!-- White cross -->
  <rect x="0" y="260" width="900" height="80" fill="white"/>
  <rect x="410" y="0" width="80" height="600" fill="white"/>
  <!-- Center coat of arms simplified -->
  <circle cx="450" cy="300" r="60" fill="#002D62" stroke="white" stroke-width="3"/>
  <text x="450" y="308" text-anchor="middle" font-size="28" fill="#FFD700" font-weight="bold" font-family="serif">RD</text>
</svg>
