<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B1FA8"/>
      <stop offset="100%" stop-color="#2D0860"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A1080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D0F6E"/>
      <stop offset="100%" stop-color="#1A0530"/>
    </linearGradient>
    <linearGradient id="tieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6B2A"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8976A"/>
      <stop offset="100%" stop-color="#A8744A"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A2A1A"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="200" fill="url(#glowGrad)"/>

  <!-- Subtle geometric pattern -->
  <g opacity="0.08" stroke="#C9A84C" stroke-width="1" fill="none">
    <circle cx="200" cy="200" r="160"/>
    <circle cx="200" cy="200" r="130"/>
    <line x1="40" y1="200" x2="360" y2="200"/>
    <line x1="200" y1="40" x2="200" y2="360"/>
    <line x1="87" y1="87" x2="313" y2="313"/>
    <line x1="313" y1="87" x2="87" y2="313"/>
  </g>

  <g clip-path="url(#circleClip)">
    <!-- Body / Suit -->
    <ellipse cx="200" cy="370" rx="160" ry="90" fill="url(#suitGrad)"/>
    <!-- Shirt white -->
    <rect x="180" y="280" width="40" height="80" rx="2" fill="#F0EEF8"/>
    <!-- Tie -->
    <polygon points="200,270 207,285 204,340 196,340 193,285" fill="url(#tieGrad)"/>
    <!-- Lapels -->
    <polygon points="180,270 200,285 200,230 160,260" fill="#2A0850"/>
    <polygon points="220,270 200,285 200,230 240,260" fill="#2A0850"/>
    <!-- Suit jacket -->
    <path d="M80,400 Q80,300 130,270 L200,290 L270,270 Q320,300 320,400 Z" fill="url(#suitGrad)"/>
    <!-- Shirt collar -->
    <polygon points="193,252 200,268 207,252 200,245" fill="#F0EEF8"/>

    <!-- Neck -->
    <rect x="185" y="230" width="30" height="35" rx="8" fill="url(#skinGrad)"/>

    <!-- Head -->
    <ellipse cx="200" cy="195" rx="72" ry="82" fill="url(#skinGrad)" filter="url(#shadow)"/>

    <!-- Hair -->
    <ellipse cx="200" cy="135" rx="72" ry="30" fill="url(#hairGrad)"/>
    <path d="M128,155 Q125,120 145,108 Q170,95 200,93 Q230,95 255,108 Q275,120 272,155 Q265,130 248,118 Q225,105 200,104 Q175,105 152,118 Q135,130 128,155 Z" fill="url(#hairGrad)"/>
    <!-- Gray temples -->
    <ellipse cx="134" cy="165" rx="12" ry="18" fill="#8A8070" opacity="0.7"/>
    <ellipse cx="266" cy="165" rx="12" ry="18" fill="#8A8070" opacity="0.7"/>

    <!-- Eyebrows -->
    <path d="M160,168 Q175,160 190,165" stroke="#3A2A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M210,165 Q225,160 240,168" stroke="#3A2A1A" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="175" cy="182" rx="14" ry="10" fill="white"/>
    <ellipse cx="225" cy="182" rx="14" ry="10" fill="white"/>
    <circle cx="177" cy="183" r="7" fill="#2A1A0A"/>
    <circle cx="227" cy="183" r="7" fill="#2A1A0A"/>
    <circle cx="179" cy="181" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="229" cy="181" r="2.5" fill="white" opacity="0.9"/>
    <!-- Eyelids -->
    <path d="M161,176 Q175,170 189,176" stroke="#3A2A1A" stroke-width="2" fill="none"/>
    <path d="M211,176 Q225,170 239,176" stroke="#3A2A1A" stroke-width="2" fill="none"/>

    <!-- Nose -->
    <path d="M196,195 Q193,210 188,218 Q196,222 200,221 Q204,222 212,218 Q207,210 204,195" fill="#B87455" opacity="0.6"/>

    <!-- Mouth — confident slight smile -->
    <path d="M183,240 Q200,252 217,240" stroke="#8A4A30" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M185,240 Q200,247 215,240" fill="#C07050" opacity="0.4"/>

    <!-- Ears -->
    <ellipse cx="128" cy="195" rx="10" ry="16" fill="url(#skinGrad)"/>
    <ellipse cx="272" cy="195" rx="10" ry="16" fill="url(#skinGrad)"/>

    <!-- Suit pocket square (gold) -->
    <polygon points="252,278 265,275 264,286 253,286" fill="#C9A84C"/>
  </g>

  <!-- Border ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
</svg>
